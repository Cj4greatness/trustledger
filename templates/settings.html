<!DOCTYPE html>
<html data-theme="light">
<head>
    <title>Settings - TrustLedger</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="topbar">
        <div class="brand-wrap">
            <div class="brand">Trust<span>Ledger</span></div>
            <div class="subtext">{{ user.business_name }}</div>
        </div>
        <div class="topbar-right">
            <button class="theme-toggle" id="themeToggleBtn" onclick="toggleTheme()">☾</button>
            <div class="profile-menu">
                <button class="profile-btn" id="profileBtn" onclick="toggleProfileMenu()">{{ user.business_name }} ▾</button>
                <div class="profile-dropdown" id="profileDropdown">
                    <a href="/wallet">Wallet</a>
                    <a href="/dashboard">Dashboard</a>
                    <a href="/settings">Settings</a>
                    <a href="/logout">Log out</a>
                </div>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="panel" style="max-width: 420px;">
            <h2>Account Settings</h2>
            {% if message %}
            <div style="color: var(--success); font-size: 13px; margin-bottom: 12px;">{{ message }}</div>
            {% endif %}
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            <form action="/settings" method="post">
                <label style="font-size:12px; color:var(--slate);">Business Name</label>
                <input type="text" name="business_name" value="{{ user.business_name }}" required>
                <label style="font-size:12px; color:var(--slate);">Email</label>
                <input type="email" name="email" value="{{ user.email }}" required>
                <label style="font-size:12px; color:var(--slate);">New Password (leave blank to keep current)</label>
                <input type="password" name="password" placeholder="••••••••">
                <button type="submit">Save Changes</button>
            </form>
        </div>
    </div>
    <a href="/chat" class="chat-fab" title="Assistant">💬</a>
    <script src="/static/app.js"></script>
</body>
</html>
