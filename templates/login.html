<!DOCTYPE html>
<html>
<head>
    <title>TrustLedger Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="login-wrap"><button class="theme-toggle" id="themeToggleBtn" onclick="toggleTheme()" style="position:absolute; top:20px; right:20px;">☾</button>
        <form class="login-card" action="/login" method="post">
            <div class="brand">Trust<span>Ledger</span></div>
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        <p style="text-align:center; margin-top:14px;"><a href="/signup" style="color:white; font-size:13px;">New here? Create an account</a></p>
    </div>
<script src="/static/app.js"></script></body>
</html>
