version: '3.8'

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: trustledger
      POSTGRES_USER: trustledger_user
      POSTGRES_PASSWORD: changeme_postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustledger_user -d trustledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://trustledger_user:changeme_postgres@db/trustledger
    env_file:
      - .env
    ports:
      - "8000:8000"

volumes:
  pgdata:
